# 测试环境配置 - 使用H2内存数据库替代金仓数据库
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

logging:
  level:
    com.example.kingbaseiot: debug
